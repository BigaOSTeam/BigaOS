name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - run: npm install
        working-directory: server
      - run: npm install
        working-directory: client

      # Build server (TypeScript → dist/)
      - run: npm run build
        working-directory: server

      # Copy non-TS runtime files into dist/
      - name: Copy server runtime assets
        run: |
          cp server/src/database/schema.sql server/dist/database/
          cp server/src/i18n/*.txt server/dist/i18n/

      # Build client (Vite → dist/)
      - run: npm run build
        working-directory: client

      # Package release tarball
      - name: Create release tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release/server release/client
          cp -r server/dist release/server/
          cp server/package.json server/package-lock.json release/server/
          cp -r client/dist release/client/
          cp -r gpio-agent release/
          cp package.json release/
          cp install.sh release/
          cd release
          tar -czf ../bigaos-${GITHUB_REF_NAME}.tar.gz .

      # ---- Android APK build ----
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor web assets to Android project
        working-directory: client
        run: npx cap sync android

      - name: Build debug APK
        working-directory: client/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp client/android/app/build/outputs/apk/debug/app-debug.apk bigaos-${GITHUB_REF_NAME}.apk

      # Create GitHub release with the tarball + APK
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bigaos-${{ github.ref_name }}.tar.gz
            bigaos-${{ github.ref_name }}.apk
          generate_release_notes: true
