name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install dependencies
      - run: npm install
        working-directory: server
      - run: npm install
        working-directory: client

      # Build server (TypeScript → dist/)
      - run: npm run build
        working-directory: server

      # Copy non-TS runtime files into dist/
      - name: Copy server runtime assets
        run: |
          cp server/src/database/schema.sql server/dist/database/
          cp server/src/i18n/*.txt server/dist/i18n/

      # Build client (Vite → dist/)
      - run: npm run build
        working-directory: client

      # Package release tarball
      - name: Create release tarball
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p release/server release/client
          cp -r server/dist release/server/
          cp server/package.json server/package-lock.json release/server/
          cp -r client/dist release/client/
          cp -r gpio-agent release/
          cp package.json release/
          cp install.sh release/
          cd release
          tar -czf ../bigaos-${GITHUB_REF_NAME}.tar.gz .

      # ---- Android APK build ----
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor web assets to Android project
        working-directory: client
        run: npx cap sync android

      - name: Compute Android version from tag
        id: android_version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          IFS='.' read -r MAJ MIN PAT <<< "$TAG"
          MAJ=${MAJ:-0}; MIN=${MIN:-0}; PAT=${PAT:-0}
          CODE=$((MAJ * 10000 + MIN * 100 + PAT))
          echo "name=$TAG" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/bigaos-release.jks

      - name: Build release APK
        working-directory: client/android
        env:
          BIGAOS_KEYSTORE_FILE: ${{ runner.temp }}/bigaos-release.jks
          BIGAOS_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BIGAOS_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          BIGAOS_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon \
            -PbigaosVersionCode=${{ steps.android_version.outputs.code }} \
            -PbigaosVersionName=${{ steps.android_version.outputs.name }}

      - name: Rename APK
        run: cp client/android/app/build/outputs/apk/release/app-release.apk bigaos-${GITHUB_REF_NAME}.apk

      - name: Clean up keystore
        if: always()
        run: rm -f $RUNNER_TEMP/bigaos-release.jks

      # Create GitHub release with the tarball + APK
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bigaos-${{ github.ref_name }}.tar.gz
            bigaos-${{ github.ref_name }}.apk
          generate_release_notes: true
